<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
        }

        header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111827;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #38bdf8;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero h1 {
            font-size: 55px;
            margin-bottom: 15px;
        }

        .hero span {
            color: #38bdf8;
        }

        .hero p {
            font-size: 20px;
            color: #cbd5e1;
            max-width: 600px;
        }

        button {
            margin-top: 30px;
            padding: 14px 35px;
            border: none;
            border-radius: 30px;
            background: #38bdf8;
            color: black;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: white;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #111827;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">NOVA</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>


<section class="hero">

    <h1>Welcome to <span>NOVA</span></h1>

    <p>
        A modern website built with HTML, CSS and creativity.
        Explore something new and innovative.
    </p>

    <button>
        Get Started
    </button>

</section>


<footer>
    © 2026 NOVA | All Rights Reserved
</footer>


</body>
</html>
